appId: com.message-extract.app
productName: Message Extract

directories:
  buildResources: build
  output: dist-electron/output

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Message Extract
  uninstallDisplayName: Message Extract

compression: maximum

files:
  - dist-electron/app/**/*
  - "!node_modules/**/*"
  - "!**/*.map"
  - "!src/**/*"
  - "!test*/**/*"
  - "!electron/**/*"
  - "!scripts/**/*"
  - "!public/**/*"
  - "!docs/**/*"
  - "!build/**/*"
  - "!.next/**/*"
  - "!dist-electron/output/**/*"
  - "!dist-electron/win-unpacked/**/*"
  - "!*.png"
  - "!*.log"
  - "!*.ts"
  - "!.env*"

extraResources:
  - from: .next/standalone/server.js
    to: standalone/server.js
  - from: .next/standalone/index.js
    to: standalone/index.js
  - from: .next/standalone/package.json
    to: standalone/package.json
  - from: .next/standalone/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"
      - "!@next/swc-*/*-linux-*"
      - "!@next/swc-*/*-darwin-*"
      - "!@next/swc-*/*-win32-ia32*"
  - from: .next/standalone/.next
    to: standalone/.next
    filter:
      - "**/*"
      - "!**/*.map"
  - from: .next/static
    to: standalone/.next/static

asar: true
