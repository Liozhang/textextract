appId: com.message-extract.app
productName: Message Extract
directories:
  buildResources: build
  output: dist-electron

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Message Extract
  uninstallDisplayName: Message Extract

files:
  - dist-electron/**/*
  - "!dist-electron/**/*.ts"

extraResources:
  - from: .next/standalone
    to: standalone
  - from: .next/static
    to: standalone/.next/static
  - from: public
    to: standalone/public

asar: false
