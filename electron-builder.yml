appId: com.message-extract.app
productName: Message Extract
directories:
  buildResources: build
  output: dist-electron

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Message Extract
  uninstallDisplayName: Message Extract

files:
  - dist-electron/app/**/*
  - "!node_modules/**/*"

extraResources:
  - from: .next/standalone/server.js
    to: standalone/server.js
  - from: .next/standalone/index.js
    to: standalone/index.js
  - from: .next/standalone/package.json
    to: standalone/package.json
  - from: .next/standalone/node_modules
    to: standalone/node_modules
    filter:
      - "**/*"
      - "!@next/swc-*/*-linux-*"
      - "!@next/swc-*/*-darwin-*"
      - "!@next/swc-*/*-win32-ia32*"
  - from: .next/standalone/.next
    to: standalone/.next
  - from: .next/static
    to: standalone/.next/static

asar: false
